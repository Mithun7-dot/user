name: mithun_rocks
description: Rockstar - Premium Fashion E-Commerce App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.5.3

  # Payments
  razorpay_flutter: ^1.3.7

  # UI & Styling
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Storage & Secure
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
